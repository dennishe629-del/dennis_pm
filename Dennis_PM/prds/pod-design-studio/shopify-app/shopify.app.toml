# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "YOUR_CLIENT_ID_HERE"
name = "POD Design Studio"
handle = "pod-design-studio"
application_url = "https://your-app-url.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-dev-store.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_publications,write_publications"

[auth]
redirect_urls = [
  "https://your-app-url.com/auth/callback",
  "https://your-app-url.com/auth/shopify/callback",
  "https://your-app-url.com/api/auth/callback"
]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks"

[app_proxy]
url = "https://your-app-url.com/proxy"
subpath = "pod-designer"
proxy_vendor = "POD Studio"

[pos]
embedded = false

# ============================================
# ADMIN EXTENSIONS - 核心配置
# ============================================

# 产品页面区块扩展 - 让商家在产品编辑页配置设计区域
[[extensions]]
type = "ui_extension"
name = "Product Design Configuration"
handle = "product-design-config"

  [[extensions.targeting]]
  module = "./extensions/product-configuration-block/src/index.jsx"
  target = "admin.product-details.block.render"

# 产品操作菜单扩展
[[extensions]]
type = "ui_extension"
name = "Product Design Action"
handle = "product-design-action"

  [[extensions.targeting]]
  module = "./extensions/product-action/src/index.jsx"
  target = "admin.product-details.action.render"

# ============================================
# STOREFRONT EXTENSIONS
# ============================================

# Theme App Extension - 在店铺前端显示设计器
[[extensions]]
type = "theme"
name = "POD Design Studio Storefront"
handle = "pod-storefront"

# Checkout UI Extension - 结账页面显示定制信息
[[extensions]]
type = "checkout_ui_extension"
name = "POD Checkout Info"
handle = "pod-checkout-info"

  [[extensions.targeting]]
  module = "./extensions/checkout-ui/src/index.jsx"
  target = "purchase.checkout.block.render"
