api_version = "2024-01"

# Theme App Extension for Storefront Design Studio
# This adds a design studio block to product pages

[[extensions]]
type = "theme"
name = "POD Design Studio Storefront"
handle = "pod-storefront"

# App blocks that merchants can add to their theme
[extensions.capabilities]
block_rendering = true

# App embed block - loads the design studio script
[[extensions.blocks]]
name = "POD Design Studio"
type = "@app"
target = "section"
